---
# tasks file for filesystems
- name: Create Volume Groups
  community.general.lvg:
    vg: "{{ item.vg }}"
    pvs: "{{ item.pvs }}"
    pesize: "{{ item.pesize | default(omit) }}"
    pv_options: "{{ item.pv_options | default(omit) }}"
    vg_options: "{{ item.vg_options | default(omit) }}"
    state: "{{ item.state | default('present') }}"
    force: "{{ item.force | default(omit) }}"
    pvresize: "{{ item.pvresize | default(omit) }}"
    remove_extra_pvs: "{{ item.remove_extra_pvs | default(omit) }}"
    reset_vg_uuid: "{{ item.reset_vg_uuid | default(omit) }}"
    reset_pv_uuid: "{{ item.reset_pv_uuid | default(omit) }}"
  loop: "{{ filesystems_vgs }}"
  when: filesystems_vgs is defined

- name: Create Logical Volumes
  community.general.lvol:
    lv: "{{ item.lv | default(omit) }}"
    vg: "{{ item.vg }}"
    size: "{{ item.size | default(omit) }}"
    active: "{{ item.active | default(omit) }}"
    force: "{{ item.force | default(omit) }}"
    opts: "{{ item.opts | default(omit) }}"
    pvs: "{{ item.pvs | default(omit) }}"
    resizefs: "{{ item.resizefs | default(omit) }}"
    shrink: "{{ item.shrink | default(omit) }}"
    snapshot: "{{ item.snapshot | default(omit) }}"
    state: "{{ item.state | default('present') }}"
    thinpool: "{{ item.thinpool | default(omit) }}"
  loop: "{{ filesystems_lvols }}"
  when: filesystems_lvols is defined

- name: Create filesystems
  community.general.filesystem:
    dev: "{{ item.dev }}"
    force: "{{ item.force | default(omit) }}"
    fstype: "{{ item.fstype | default(omit) }}"
    opts: "{{ item.opts | default(omit) }}"
    resizefs: "{{ item.resizefs | default(omit) }}"
    state: "{{ item.state | default('present') }}"
    uuid: "{{ item.uuid | default(omit) }}"
  loop: "{{ filesystems }}"
  when: filesystems is defined

- name: Create mounts
  ansible.posix.mount:
    path: "{{ item.path }}"
    state: "{{ item.state }}"
    backup: "{{ item.backup | default(omit) }}"
    boot: "{{ item.boot | default(omit) }}"
    dump: "{{ item.dump | default(omit) }}"
    fstab: "{{ item.fstab | default(omit) }}"
    fstype: "{{ item.fstype | default(omit) }}"
    opts: "{{ item.opts | default(omit) }}"
    opts_no_log: "{{ item.opts_no_log | default(omit) }}"
    passno: "{{ item.passno | default(omit) }}"
    src: "{{ item.src | default(omit) }}"
  loop: "{{ filesystems_mounts }}"
  when: filesystems_mounts is defined

- name: Set mount point owner and mode
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner.user }}"
    group: "{{ item.owner.group }}"
    mode: "{{ item.owner.mode | default('0755') }}"
  loop: "{{ filesystems_mounts }}"
  when:
    - filesystems_mounts is defined
    - item.owner is defined
...
