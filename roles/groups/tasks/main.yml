---
# tasks file for groups
- name: Add groups
  ansible.builtin.group:
    name: "{{ item.name }}"
    gid: "{{ item.gid }}"
    system: "{{ item.sysgroup | default(false) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ linux_groups }}"
  when: linux_groups is defined

- name: Add sudoers dropin
  ansible.builtin.copy:
    src: "{{ item.sudoers_file }}"
    dest: "/etc/sudoers.d/{{ item.name }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ linux_groups }}"
  when:
    - linux_groups is defined
    - item.sudoers_file is defined
...
